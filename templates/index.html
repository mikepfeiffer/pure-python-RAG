<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
    }

    header span.badge {
      font-size: 11px;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 780px;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user .bubble { white-space: pre-wrap; }

    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 4px 0 8px 20px; }
    .bubble li { margin-bottom: 2px; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 4px; font-size: 15px; color: #f1f5f9; }
    .bubble code { background: #0f1117; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }
    .bubble pre { background: #0f1117; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { color: #f1f5f9; }
    .bubble a { color: #60a5fa; text-decoration: underline; }

    .message.user .bubble {
      background: #1d4ed8;
      color: #eff6ff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e2533;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .bubble.error {
      background: #3b1a1a;
      color: #fca5a5;
    }

    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-chip {
      font-size: 11px;
      background: #0f2235;
      border: 1px solid #1e3a5f;
      color: #7dd3fc;
      padding: 3px 10px;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .source-chip:hover { background: #1e3a5f; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
      background: #1e2533;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #1e2533;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #question-input {
      flex: 1;
      background: #1e2533;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
      max-height: 160px;
    }

    #question-input::placeholder { color: #4a5568; }
    #question-input:focus { border-color: #3b82f6; }

    #send-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-end;
      height: 46px;
    }

    #send-btn:hover:not(:disabled) { background: #1d4ed8; }
    #send-btn:disabled { background: #1e3a5f; color: #4a5568; cursor: not-allowed; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4a5568;
      font-size: 15px;
    }

    #empty-state .icon { font-size: 40px; }

    .ingest-card {
      background: #0f2235;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      max-width: 460px;
    }

    .ingest-card.success { border-color: #166534; background: #052e16; }
    .ingest-card.error   { border-color: #7f1d1d; background: #1c0a0a; }

    .ingest-card .card-icon { font-size: 20px; flex-shrink: 0; }

    .ingest-card .card-body { display: flex; flex-direction: column; gap: 2px; }
    .ingest-card .card-title { font-weight: 600; color: #f1f5f9; font-size: 13px; }
    .ingest-card .card-sub   { color: #94a3b8; font-size: 12px; }
    .ingest-card.error .card-title { color: #fca5a5; }

    .spinner {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid #1e3a5f;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #question-input.url-mode { border-color: #7c3aed; }
    #question-input.url-mode:focus { border-color: #a78bfa; }

    .transcript-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 520px;
    }

    .transcript-list-header {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .transcript-item {
      background: #1e2533;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .transcript-item-title {
      font-size: 13px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transcript-item-meta {
      font-size: 11px;
      color: #4a5568;
      flex-shrink: 0;
    }

    .transcript-item a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 11px;
      flex-shrink: 0;
    }

    .transcript-item a:hover { text-decoration: underline; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #94a3b8;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <h1>Transcript RAG</h1>
    <span class="badge">Video Q&amp;A</span>
  </header>

  <div id="chat-container">
    <div id="empty-state">
      <div class="icon">🎬</div>
      <div>Paste a YouTube URL to add a transcript, or ask a question</div>
    </div>
  </div>

  <div id="input-area">
    <textarea
      id="question-input"
      placeholder="Ask a question or paste a YouTube URL..."
      rows="1"
    ></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const input = document.getElementById("question-input");
    const sendBtn = document.getElementById("send-btn");
    let emptyState = document.getElementById("empty-state");

    const YT_RE = /^https?:\/\/(www\.)?(youtube\.com\/watch\?.*v=|youtu\.be\/)[\w-]+/;

    function isYouTubeUrl(text) {
      return YT_RE.test(text.trim());
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    }

    input.addEventListener("input", () => {
      autoResize();
      const val = input.value;
      input.classList.toggle("url-mode", isYouTubeUrl(val));
      sendBtn.textContent = isYouTubeUrl(val) ? "Add" : "Send";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    function clearEmptyState() {
      if (emptyState) { emptyState.remove(); emptyState = null; }
    }

    function appendMessage(role, content, sources = []) {
      clearEmptyState();

      const msg = document.createElement("div");
      msg.className = `message ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble" + (role === "error" ? " error" : "");
      if (role === "assistant") {
        bubble.innerHTML = marked.parse(content);
      } else {
        bubble.textContent = content;
      }
      msg.appendChild(bubble);

      if (sources.length > 0) {
        const sourcesEl = document.createElement("div");
        sourcesEl.className = "sources";

        const seen = new Set();
        sources.forEach((s) => {
          const key = s.video_title;
          if (seen.has(key)) return;
          seen.add(key);

          const chip = document.createElement("a");
          chip.className = "source-chip";
          chip.textContent = s.video_title;
          if (s.url) {
            chip.href = s.url;
            chip.target = "_blank";
            chip.rel = "noopener noreferrer";
          } else {
            chip.href = "#";
          }
          sourcesEl.appendChild(chip);
        });

        msg.appendChild(sourcesEl);
      }

      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msg;
    }

    function appendTyping() {
      clearEmptyState();
      const msg = document.createElement("div");
      msg.className = "message assistant";
      msg.id = "typing";
      msg.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function appendIngestCard(state, icon, title, sub) {
      clearEmptyState();
      const msg = document.createElement("div");
      msg.className = "message assistant";
      msg.id = "ingest-card";

      const card = document.createElement("div");
      card.className = `ingest-card ${state}`;
      card.innerHTML = `
        <div class="${state === "loading" ? "spinner" : "card-icon"}">${state !== "loading" ? icon : ""}</div>
        <div class="card-body">
          <div class="card-title">${title}</div>
          ${sub ? `<div class="card-sub">${sub}</div>` : ""}
        </div>`;

      msg.appendChild(card);
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msg;
    }

    function removeIngestCard() {
      const el = document.getElementById("ingest-card");
      if (el) el.remove();
    }

    async function showTranscripts() {
      appendMessage("user", "/transcripts");
      appendTyping();

      try {
        const res = await fetch("/transcripts");
        const data = await res.json();
        removeTyping();
        clearEmptyState();

        const msg = document.createElement("div");
        msg.className = "message assistant";

        const list = document.createElement("div");
        list.className = "transcript-list";

        if (data.length === 0) {
          const empty = document.createElement("div");
          empty.className = "bubble";
          empty.style.background = "#1e2533";
          empty.textContent = "No transcripts indexed yet. Paste a YouTube URL to add one.";
          msg.appendChild(empty);
        } else {
          const header = document.createElement("div");
          header.className = "transcript-list-header";
          header.textContent = `${data.length} transcript${data.length !== 1 ? "s" : ""} in index`;
          list.appendChild(header);

          data.forEach((t) => {
            const item = document.createElement("div");
            item.className = "transcript-item";
            item.innerHTML = `
              <div class="transcript-item-title" title="${t.title}">${t.title}</div>
              <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
                <span class="transcript-item-meta">${t.chunks} chunks</span>
                ${t.url ? `<a href="${t.url}" target="_blank" rel="noopener noreferrer">Watch ↗</a>` : ""}
              </div>`;
            list.appendChild(item);
          });

          msg.appendChild(list);
        }

        chatContainer.appendChild(msg);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      } catch (err) {
        removeTyping();
        appendMessage("assistant error", "Failed to load transcripts.");
      }
    }

    async function addTranscript(url) {
      appendMessage("user", url);
      appendIngestCard("loading", "", "Downloading and indexing transcript…", "This may take a moment");

      try {
        const res = await fetch("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();
        removeIngestCard();

        if (!res.ok || data.error) {
          appendIngestCard("error", "✗", "Failed to add transcript", data.error || "Unknown error");
        } else {
          appendIngestCard(
            "success", "✓",
            data.title,
            `by ${data.author} · indexed and ready`
          );
        }
      } catch (err) {
        removeIngestCard();
        appendIngestCard("error", "✗", "Network error", "Is the server running?");
      }
    }

    async function askQuestion(question) {
      appendMessage("user", question);
      appendTyping();

      let fullText = "";
      let sources = [];
      let bubble = null;
      let msgEl = null;

      function initBubble() {
        removeTyping();
        clearEmptyState();
        msgEl = document.createElement("div");
        msgEl.className = "message assistant";
        bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = '<span class="cursor"></span>';
        msgEl.appendChild(bubble);
        chatContainer.appendChild(msgEl);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function appendSourcesToMsg(srcs) {
        if (!srcs.length || !msgEl) return;
        const sourcesEl = document.createElement("div");
        sourcesEl.className = "sources";
        const seen = new Set();
        srcs.forEach((s) => {
          if (seen.has(s.video_title)) return;
          seen.add(s.video_title);
          const chip = document.createElement("a");
          chip.className = "source-chip";
          chip.textContent = s.video_title;
          if (s.url) { chip.href = s.url; chip.target = "_blank"; chip.rel = "noopener noreferrer"; }
          else { chip.href = "#"; }
          sourcesEl.appendChild(chip);
        });
        msgEl.appendChild(sourcesEl);
      }

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          const data = await res.json();
          removeTyping();
          appendMessage("assistant error", data.error || "Something went wrong.");
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        function processBuffer(buf) {
          const parts = buf.split("\n\n");
          const remaining = parts.pop();
          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith("data: ")) continue;
            try {
              const event = JSON.parse(line.slice(6));
              if (event.type === "sources") {
                sources = event.sources;
                initBubble();
              } else if (event.type === "token") {
                if (!bubble) initBubble();
                fullText += event.text;
                bubble.innerHTML = marked.parse(fullText) + '<span class="cursor"></span>';
                chatContainer.scrollTop = chatContainer.scrollHeight;
              } else if (event.type === "done") {
                bubble.innerHTML = marked.parse(fullText);
                appendSourcesToMsg(sources);
                chatContainer.scrollTop = chatContainer.scrollHeight;
              }
            } catch { /* ignore malformed event */ }
          }
          return remaining;
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            // Flush any remaining buffered data before exiting
            if (buffer.trim()) processBuffer(buffer + "\n\n");
            break;
          }
          buffer += decoder.decode(value, { stream: true });
          buffer = processBuffer(buffer);
        }
      } catch (err) {
        removeTyping();
        appendMessage("assistant error", "Network error. Is the server running?");
      }
    }

    async function sendMessage() {
      const value = input.value.trim();
      if (!value) return;

      input.value = "";
      input.style.height = "auto";
      input.classList.remove("url-mode");
      sendBtn.textContent = "Send";
      sendBtn.disabled = true;

      if (value === "/transcripts") {
        await showTranscripts();
      } else if (isYouTubeUrl(value)) {
        await addTranscript(value);
      } else {
        await askQuestion(value);
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
